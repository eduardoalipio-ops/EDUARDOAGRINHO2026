<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defensor da Natureza</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
    overflow: hidden;
  }

  h1 {
    text-align: center;
    color: #2E7D32;
  }

  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: #81c784;
    border: 4px solid #2E7D32;
    border-radius: 12px;
  }

  #score {
    text-align: center;
    font-size: 20px;
    color: #2E7D32;
    margin: 10px 0;
  }
</style>
</head>
<body>

<h1>Defensor da Natureza 🌱</h1>
<div id="score">Pontuação: 0</div>
<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const árvores = [{x: 50, y: 150}, {x: 50, y: 300}];
  const sementes = [];
  const poluicao = [];
  let score = 0;
  let gameOver = false;

  // Criar poluição
  function spawnPoluicao() {
    const y = Math.random() > 0.5 ? 150 : 300;
    poluicao.push({x: canvas.width, y: y, width: 40, height: 40, speed: 2});
  }

  // Desenhar árvores
  function drawArvores() {
    ctx.fillStyle = "#2E7D32";
    árvores.forEach(arv => {
      ctx.fillRect(arv.x, arv.y, 40, 40);
      ctx.fillStyle = "#4CAF50";
      ctx.beginPath();
      ctx.arc(arv.x + 20, arv.y, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2E7D32";
    });
  }

  // Desenhar sementes
  function drawSementes() {
    ctx.fillStyle = "#FFEB3B";
    sementes.forEach((s, i) => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, 8, 0, Math.PI * 2);
      ctx.fill();
      s.x += s.speed;

      // Colisão com poluição
      poluicao.forEach((p, j) => {
        if (s.x > p.x && s.x < p.x + p.width && s.y > p.y && s.y < p.y + p.height) {
          poluicao.splice(j, 1);
          sementes.splice(i, 1);
          score += 10;
        }
      });

      // Remover sementes fora do canvas
      if (s.x > canvas.width) sementes.splice(i, 1);
    });
  }

  // Desenhar poluição
  function drawPoluicao() {
    ctx.fillStyle = "#616161";
    poluicao.forEach((p, i) => {
      ctx.fillRect(p.x, p.y, p.width, p.height);
      p.x -= p.speed;

      // Chegou no final => game over
      if (p.x < 0) gameOver = true;
    });
  }

  // Atualizar canvas
  function update() {
    if (gameOver) {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      ctx.font = "40px Arial";
      ctx.fillText("Game Over 🌱", canvas.width/2 - 120, canvas.height/2);
      ctx.font = "25px Arial";
      ctx.fillText(`Pontuação Final: ${score}`, canvas.width/2 - 90, canvas.height/2 + 40);
      return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawArvores();
    drawSementes();
    drawPoluicao();

    document.getElementById('score').innerText = `Pontuação: ${score}`;

    requestAnimationFrame(update);
  }

  // Atirar sementes
  canvas.addEventListener('click', function(event){
    const rect = canvas.getBoundingClientRect();
    const mouseY = event.clientY - rect.top;

    // Escolhe árvore mais próxima verticalmente
    let arvoreEscolhida = árvores[0];
    if (Math.abs(mouseY - árvores[1].y) < Math.abs(mouseY - árvores[0].y)) {
      arvoreEscolhida = árvores[1];
    }

    sementes.push({x: arvoreEscolhida.x + 40, y: arvoreEscolhida.y + 20, speed: 5});
  });

  // Gerar poluição a cada 2 segundos
  setInterval(() => {
    if (!gameOver) spawnPoluicao();
  }, 2000);

  update();
</script>

</body>
</html>
